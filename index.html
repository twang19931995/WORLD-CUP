<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 世界杯竞猜大师 | 终极华丽版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 稳定的 CDN 依赖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.5.2/mqtt.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appBg: '#0f172a',
                        cardGold: 'linear-gradient(135deg, #fff9c4, #fbc02d)',
                        cardBlue: 'linear-gradient(135deg, #e3f2fd, #42a5f5)',
                        cardRed: 'linear-gradient(135deg, #ffebee, #ef5350)',
                        cardGreen: 'linear-gradient(135deg, #e8f5e9, #66bb6a)',
                        cardPurple: 'linear-gradient(135deg, #f3e5f5, #ab47bc)',
                    },
                    animation: {
                        'spin-slow': 'spin 10s linear infinite',
                        'bounce-in': 'bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    },
                    keyframes: {
                        bounceIn: {
                            '0%': { opacity: 0, transform: 'scale(0.8) translateY(20px)' },
                            '100%': { opacity: 1, transform: 'scale(1) translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background: #003a8c;
            background-image: radial-gradient(circle at 50% 0%, #007bff 0%, #001529 80%);
            color: #fff; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 80px; /* 留出底部导航栏高度 */
        }
        
        h1, h2, h3, .brand-font { font-family: 'Orbitron', 'Noto Sans SC', sans-serif; }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0px; height: 0px; display: none; } 
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 3D 高光卡片样式 (复刻参考图) */
        .match-card {
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.4);
            color: #1a1a1a;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .match-card:active { transform: scale(0.97); }

        .card-yellow { background: linear-gradient(135deg, #fffbe6 0%, #ffd666 100%); }
        .card-blue { background: linear-gradient(135deg, #e6f7ff 0%, #69c0ff 100%); }
        .card-red { background: linear-gradient(135deg, #fff0f6 0%, #ff85c0 100%); }
        .card-green { background: linear-gradient(135deg, #f6ffed 0%, #95de64 100%); }
        
        /* 发光足球边框 */
        .soccer-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.8), inset 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 28px;
            position: relative;
        }
        .soccer-icon::after {
            content: ''; position: absolute; inset: -4px;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.6);
            border-top-color: transparent; animation: spin 2s linear infinite;
        }

        /* 3D 胶囊按钮 */
        .btn-3d {
            background: linear-gradient(to bottom, #ff9c00, #ff5500);
            border: none; border-radius: 999px;
            color: white; font-weight: 900;
            box-shadow: 0 4px 10px rgba(255,85,0,0.4), inset 0 2px 2px rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(255,85,0,0.4); }
        .btn-blue { background: linear-gradient(to bottom, #40a9ff, #096dd9); box-shadow: 0 4px 10px rgba(9,109,217,0.4), inset 0 2px 2px rgba(255,255,255,0.3); }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 20, 40, 0.95); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
            z-index: 50; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: #64748b; font-size: 10px; transition: all 0.2s; cursor: pointer;
        }
        .nav-item.active { color: #00f3ff; text-shadow: 0 0 10px rgba(0,243,255,0.5); transform: translateY(-2px); }
        .nav-icon { font-size: 20px; }

        /* 数据卡片 */
        .data-card { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; }

        /* 模态框动画 */
        .modal-enter { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

    <!-- 顶部标题栏 -->
    <header class="pt-10 pb-4 px-4 text-center relative z-10">
        <h1 class="text-3xl font-black italic tracking-wider text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 drop-shadow-lg">
            2026<span class="text-yellow-400">世界杯竞猜</span>
        </h1>
        <div class="absolute right-4 top-10 flex flex-col items-end">
            <span id="room-id-display" class="bg-black/40 px-2 py-0.5 rounded text-[10px] text-gray-300 border border-white/10 mb-1">房号: public</span>
            <div id="sync-status" class="text-[10px] text-yellow-400 flex items-center gap-1 bg-black/40 px-2 py-0.5 rounded border border-white/10">
                <i class="fa-solid fa-circle-notch fa-spin"></i> 连接中
            </div>
        </div>
    </header>

    <!-- 主体容器 (限制最大宽度，更有手机APP感) -->
    <main class="max-w-md mx-auto px-4 z-10 relative" id="main-content">
        
        <!-- View 1: 首页 (排行榜) -->
        <section id="view-dashboard" class="space-y-4 animate-bounce-in">
            <!-- 头图 Banner -->
            <div class="relative w-full h-40 rounded-2xl overflow-hidden shadow-2xl border border-white/20 flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-900">
                <i class="fa-solid fa-futbol text-8xl text-white/20 absolute -right-4 -bottom-4 animate-spin-slow"></i>
                <div class="z-10 text-center">
                    <p class="text-sm text-blue-200 font-bold mb-1">全球资金池总量</p>
                    <p class="text-4xl font-black text-yellow-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] font-mono" id="global-money">$0</p>
                </div>
            </div>

            <!-- 排行榜列表 -->
            <div class="flex items-center justify-between mt-6 mb-2">
                <h2 class="text-lg font-bold text-white border-l-4 border-yellow-400 pl-2">财富排行榜</h2>
            </div>
            <div class="space-y-3" id="leaderboard-container"></div>
        </section>

        <!-- View 2: 今日比赛 -->
        <section id="view-today" class="hidden space-y-4 animate-bounce-in">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-white border-l-4 border-yellow-400 pl-2">今日赛程</h2>
            </div>
            <!-- 左右滑动的日期容器 -->
            <div id="date-scroll-container" class="flex gap-2 overflow-x-auto py-2 px-1 mb-2 no-scrollbar scroll-smooth"></div>
            <!-- 今日赛事列表 -->
            <div class="space-y-4" id="today-matches-container"></div>
        </section>

        <!-- View 3: 赛事中心 -->
        <section id="view-matches" class="hidden flex flex-col h-full animate-bounce-in">
            <!-- 搜索与筛选 -->
            <div class="flex items-center gap-2 mb-4 bg-white/10 p-1.5 rounded-full backdrop-blur-md">
                <button onclick="filterMatches('all'); playAudio('click')" id="fm-all" class="flex-1 py-1.5 rounded-full text-xs font-bold bg-white text-blue-900 shadow-md">全部</button>
                <button onclick="filterMatches('upcoming'); playAudio('click')" id="fm-up" class="flex-1 py-1.5 rounded-full text-xs font-bold text-white hover:bg-white/20">未开赛</button>
                <button onclick="filterMatches('finished'); playAudio('click')" id="fm-fin" class="flex-1 py-1.5 rounded-full text-xs font-bold text-white hover:bg-white/20">已完赛</button>
            </div>
            <div class="relative mb-4">
                <i class="fa-solid fa-search absolute left-4 top-3 text-gray-400"></i>
                <input type="text" id="match-search" oninput="renderMatches()" placeholder="搜索国家/阶段..." class="w-full bg-black/40 border border-white/20 rounded-full pl-10 pr-4 py-2.5 text-sm text-white focus:border-yellow-400 outline-none backdrop-blur-md">
            </div>

            <!-- 赛事列表容器 -->
            <div class="space-y-4" id="matches-container"></div>
        </section>

        <!-- View 4: 数据统计 -->
        <section id="view-stats" class="hidden space-y-6 animate-bounce-in pb-10">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-bold text-white border-l-4 border-neonBlue pl-2">上帝视角数据分析</h2>
            </div>
            <!-- 平铺玩家数据卡片的容器 -->
            <div id="stats-list-container" class="space-y-6"></div>
        </section>

        <!-- View 5: 玩家管理 -->
        <section id="view-players" class="hidden animate-bounce-in">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white border-l-4 border-neonPink pl-2">玩家阵营</h2>
                <button onclick="openModal('addPlayerModal'); playAudio('click')" class="btn-3d px-4 py-1.5 text-sm">招募玩家</button>
            </div>
            <div class="grid grid-cols-2 gap-3" id="players-grid"></div>
        </section>

        <!-- View 6: 设置后台 (新增管理控制后台) -->
        <section id="view-admin" class="hidden space-y-6 animate-bounce-in pb-10">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-bold text-white border-l-4 border-yellow-400 pl-2">管理控制台</h2>
            </div>
            
            <!-- 导入导出卡片 -->
            <div class="bg-black/30 border border-white/10 rounded-2xl p-4 shadow-xl backdrop-blur-md space-y-3">
                <h3 class="text-sm font-black text-yellow-400 flex items-center gap-2">
                    <i class="fa-solid fa-file-import"></i> 数据备份与恢复
                </h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="exportDatabase(); playAudio('click')" class="btn-3d py-2 text-xs bg-gradient-to-b from-blue-500 to-blue-800 shadow-[0_4px_10px_rgba(59,130,246,0.4)]">
                        <i class="fa-solid fa-file-export mr-1"></i> 导出 JSON 文件
                    </button>
                    <label class="btn-3d py-2 text-xs text-center cursor-pointer bg-gradient-to-b from-purple-500 to-purple-800 shadow-[0_4px_10px_rgba(168,85,247,0.4)] block">
                        <i class="fa-solid fa-file-import mr-1"></i> 导入 JSON 文件
                        <input type="file" id="import-file-input" class="hidden" onchange="importDatabase(event)">
                    </label>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="copyDbToClipboard(); playAudio('click')" class="btn-3d btn-blue py-2 text-xs">
                        <i class="fa-solid fa-copy mr-1"></i> 复制到剪贴板
                    </button>
                    <button onclick="pasteDbFromClipboard(); playAudio('click')" class="btn-3d py-2 text-xs bg-gradient-to-b from-emerald-500 to-emerald-800 shadow-[0_4px_10px_rgba(16,185,129,0.4)]">
                        <i class="fa-solid fa-paste mr-1"></i> 剪贴板导入
                    </button>
                </div>
            </div>

            <!-- 数据任意改 (高级 JSON 语法检查器) -->
            <div class="bg-black/30 border border-white/10 rounded-2xl p-4 shadow-xl backdrop-blur-md space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-black text-yellow-400 flex items-center gap-2">
                        <i class="fa-solid fa-code"></i> 原始数据任意修改
                    </h3>
                    <span class="text-[10px] text-gray-400">支持修改任一一句和任何字段</span>
                </div>
                <textarea id="raw-db-textarea" class="w-full h-64 bg-black/60 border border-white/20 rounded-xl p-3 font-mono text-xs text-green-400 outline-none focus:border-yellow-400" placeholder="数据加载中..."></textarea>
                <div class="flex gap-2">
                    <button onclick="formatRawDbText(); playAudio('click')" class="flex-1 py-2 text-xs font-bold rounded-xl border border-white/20 hover:bg-white/10 text-white">格式化代码</button>
                    <button onclick="saveRawDbText(); playAudio('coin')" class="flex-1 btn-3d py-2 text-sm">保存并实时同步</button>
                </div>
            </div>

            <!-- 快捷重置与管理 -->
            <div class="bg-black/30 border border-white/10 rounded-2xl p-4 shadow-xl backdrop-blur-md space-y-3">
                <h3 class="text-sm font-black text-red-400 flex items-center gap-2">
                    <i class="fa-solid fa-triangle-exclamation"></i> 危险操作区域
                </h3>
                <button onclick="resetEntireDatabase(); playAudio('click')" class="w-full btn-3d bg-gradient-to-b from-red-600 to-red-900 shadow-[0_4px_10px_rgba(220,38,38,0.4)] py-2 text-xs">
                    <i class="fa-solid fa-trash-can mr-1"></i> 重置并清空所有数据
                </button>
            </div>
        </section>
    </main>

    <!-- 底部 App 导航栏 -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-dashboard" onclick="switchTab('dashboard'); playAudio('click')">
            <i class="fa-solid fa-house nav-icon"></i><span>首页</span>
        </div>
        <div class="nav-item" id="nav-today" onclick="switchTab('today'); playAudio('click')">
            <i class="fa-solid fa-calendar-day nav-icon"></i><span>今日</span>
        </div>
        <div class="nav-item" id="nav-matches" onclick="switchTab('matches'); playAudio('click')">
            <i class="fa-solid fa-futbol nav-icon"></i><span>赛事</span>
        </div>
        <div class="nav-item" id="nav-stats" onclick="switchTab('stats'); playAudio('click')">
            <i class="fa-solid fa-chart-pie nav-icon"></i><span>数据</span>
        </div>
        <div class="nav-item" id="nav-players" onclick="switchTab('players'); playAudio('click')">
            <i class="fa-solid fa-user-group nav-icon"></i><span>阵营</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="switchTab('admin'); playAudio('click')">
            <i class="fa-solid fa-gears nav-icon"></i><span>后台</span>
        </div>
    </nav>

    <!-- Modals -->
    <!-- 添加玩家 -->
    <div id="addPlayerModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center z-50 p-4">
        <div class="bg-gradient-to-b from-[#1e3a8a] to-[#0f172a] p-6 rounded-3xl border border-white/20 w-full max-w-sm relative shadow-2xl">
            <button onclick="closeModal('addPlayerModal'); playAudio('click')" class="absolute top-4 right-4 text-white/50 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
            <h3 class="text-2xl font-black mb-6 text-center text-white">添加新玩家</h3>
            <div class="space-y-4">
                <input type="text" id="newPlayerName" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white text-center font-bold outline-none focus:border-yellow-400" placeholder="玩家代号 (必填)">
                <input type="text" id="newPlayerAvatar" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white text-center text-sm outline-none focus:border-yellow-400" placeholder="自定义头像 URL (选填)">
                <button onclick="addPlayer(); playAudio('click')" class="w-full btn-3d py-3 mt-2 text-lg">立即加入</button>
            </div>
        </div>
    </div>

    <!-- 设定对阵球队 -->
    <div id="editMatchModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center z-50 p-4">
        <div class="bg-gradient-to-b from-[#b45309] to-[#451a03] p-6 rounded-3xl border border-white/20 w-full max-w-sm relative shadow-2xl">
            <button onclick="closeModal('editMatchModal'); playAudio('click')" class="absolute top-4 right-4 text-white/50 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
            <h3 class="text-2xl font-black mb-6 text-center text-yellow-400">修改对阵</h3>
            <div class="space-y-4 flex flex-col items-center">
                <input type="hidden" id="editMatchId">
                <input type="text" id="editHome" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white text-center font-black text-xl">
                <span class="text-yellow-400 font-black text-xl italic">VS</span>
                <input type="text" id="editAway" class="w-full bg-black/50 border border-white/20 rounded-xl p-3 text-white text-center font-black text-xl">
                <button onclick="saveMatchEdit(); playAudio('click')" class="w-full btn-3d py-3 mt-4 text-lg">保存并同步</button>
            </div>
        </div>
    </div>

    <!-- 下注界面 -->
    <div id="betModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center flex-col justify-end z-50">
        <div class="bg-[#0f172a] rounded-t-3xl border-t border-white/20 w-full h-[85vh] flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-center p-4 border-b border-white/10">
                <h3 class="text-lg font-black text-yellow-400 truncate" id="bet-match-title"></h3>
                <button onclick="closeModal('betModal'); playAudio('click')" class="text-white/50 hover:text-white px-2"><i class="fa-solid fa-chevron-down text-xl"></i></button>
            </div>
            
            <div class="p-4 bg-black/40 flex items-center justify-between shrink-0">
                <span class="font-bold text-blue-300">本场单注金额 <i class="fa-solid fa-coins text-yellow-400"></i></span>
                <div class="flex items-center gap-2 bg-black rounded-lg p-1 border border-white/20">
                    <span class="text-yellow-400 font-black pl-2">$</span>
                    <input type="number" id="matchStake" class="w-20 bg-transparent text-center text-white font-black text-lg outline-none" value="100">
                </div>
            </div>

            <div id="bet-players-list" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
            
            <div class="p-4 bg-[#0f172a] border-t border-white/10 shrink-0 pb-10">
                <button onclick="saveBets(); playAudio('coin')" class="w-full btn-3d py-3 text-lg tracking-widest">锁定盘口</button>
            </div>
        </div>
    </div>

    <!-- 开奖结算 -->
    <div id="settleModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center z-50 p-4">
        <div class="bg-gradient-to-b from-[#7f1d1d] to-[#450a0a] p-6 rounded-3xl border border-white/20 w-full max-w-sm relative shadow-2xl text-center">
            <button onclick="closeModal('settleModal'); playAudio('click')" class="absolute top-4 right-4 text-white/50"><i class="fa-solid fa-times text-xl"></i></button>
            <h3 class="text-xl font-black mb-2 text-white" id="settle-match-title"></h3>
            
            <div class="bg-black/40 p-4 rounded-2xl border border-white/10 mb-6 mt-4">
                <p class="text-xs text-red-200 mb-3 font-bold">录入最终比分 (选填)</p>
                <div class="flex items-center justify-center gap-4">
                    <input type="number" id="settleScoreHome" class="w-16 h-16 bg-black border-2 border-white/20 rounded-xl text-center text-3xl font-black text-white focus:border-yellow-400 outline-none" placeholder="-">
                    <span class="text-white/50 font-black text-2xl">:</span>
                    <input type="number" id="settleScoreAway" class="w-16 h-16 bg-black border-2 border-white/20 rounded-xl text-center text-3xl font-black text-white focus:border-yellow-400 outline-none" placeholder="-">
                </div>
            </div>

            <p class="text-xs text-red-200 mb-2 font-bold">选择赛果以结算资金流向</p>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setResult('home'); playAudio('click')" id="res-home" class="result-btn py-3 rounded-xl border-2 border-white/10 font-bold text-white bg-black/30 transition">主胜</button>
                <button onclick="setResult('draw'); playAudio('click')" id="res-draw" class="result-btn py-3 rounded-xl border-2 border-white/10 font-bold text-gray-400 bg-black/30 transition">平局</button>
                <button onclick="setResult('away'); playAudio('click')" id="res-away" class="result-btn py-3 rounded-xl border-2 border-white/10 font-bold text-white bg-black/30 transition">客胜</button>
            </div>
            
            <input type="hidden" id="settleMatchId"><input type="hidden" id="settleFinalResult">
            <button onclick="confirmSettle()" class="w-full btn-3d bg-gradient-to-b from-red-500 to-red-800 shadow-[0_4px_15px_rgba(220,38,38,0.6)] py-3 text-lg">确认开奖</button>
        </div>
    </div>

    <!-- Web Audio API 音效合成引擎 -->
    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playAudio(type) {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);

        // MQTT 连接架构
        let mqttClient = null, isReceiving = false;
        const syncTopic = `wc_betmaster_sync_v4_${roomId}`;

        function initMQTT() {
            if (typeof mqtt === 'undefined') { setSyncStatus(false, "离线单机版"); return; }
            try {
                mqttClient = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                mqttClient.on('connect', () => { 
                    mqttClient.subscribe(syncTopic); 
                    setSyncStatus(true); 
                    
                    // 新设备主动握手机制：连接成功后立即向全局发送一个“请求同步最新信息”指令 [1]
                    setTimeout(() => {
                        const syncReq = { type: "sync_request", requester: myClientId };
                        mqttClient.publish(syncTopic, JSON.stringify(syncReq));
                    }, 500); 
                });
                mqttClient.on('offline', () => setSyncStatus(false)); mqttClient.on('error', () => setSyncStatus(false));
                mqttClient.on('message', (topic, message) => {
                    try {
                        const data = JSON.parse(message.toString());
                        
                        // 1. 处理来自新设备的握手同步请求 [1]
                        if (data.type === "sync_request") {
                            // 若是其他设备请求，并且本设备拥有本地数据，则代替全网重播最新数据 [1]
                            if (data.requester !== myClientId && db.players.length > 0) {
                                setTimeout(() => {
                                    broadcastData();
                                }, Math.random() * 400); // 随机微秒延迟防碰撞
                            }
                            return;
                        }

                        // 2. 处理常规数据包同步流程 [1]
                        if (data.timestamp && data.timestamp > db.timestamp) {
                            isReceiving = true; db = data; localStorage.setItem(`wc_db_v4_${roomId}`, JSON.stringify(db));
                            refreshAllUI(); setTimeout(() => isReceiving = false, 100);
                        }
                    } catch (e) { }
                });
            } catch (e) { setSyncStatus(false, "连接异常"); }
        }

        function broadcastData() {
            if (isReceiving) return;
            db.timestamp = Date.now(); localStorage.setItem(`wc_db_v4_${roomId}`, JSON.stringify(db));
            if (mqttClient && mqttClient.connected) mqttClient.publish(syncTopic, JSON.stringify(db), { retain: true });
        }

        function setSyncStatus(connected, msg = "") {
            const el = document.getElementById('sync-status');
            if(connected) el.innerHTML = '<i class="fa-solid fa-bolt text-green-400"></i> 云同步中';
            else el.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-400"></i> ${msg || '离线模式'}`;
        }

        // 日期处理助手
        function getUniqueDates() {
            const dates = new Set();
            db.matches.forEach(m => {
                const match = m.date.match(/\d+月\d+日/);
                if (match) dates.add(match[0]);
            });
            return Array.from(dates).sort((a, b) => {
                const ma = a.match(/(\d+)月(\d+)日/);
                const mb = b.match(/(\d+)月(\d+)日/);
                const da = parseInt(ma[1]) * 100 + parseInt(ma[2]);
                const dbVal = parseInt(mb[1]) * 100 + parseInt(mb[2]);
                return da - dbVal;
            });
        }

        function getWeekday(dateStr) {
            const match = dateStr.match(/(\d+)月(\d+)日/);
            if (!match) return '';
            const month = parseInt(match[1]) - 1;
            const day = parseInt(match[2]);
            const d = new Date(2026, month, day);
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return weekdays[d.getDay()];
        }

            // 初始化今日日期
            const uniqueDates = getUniqueDates();
            const today = new Date();
            const todayStr = `${today.getMonth() + 1}月${today.getDate()}日`;
            
            if (uniqueDates.includes(todayStr)) {
                activeTodayDate = todayStr;
            } else {
                const nowTime = today.getTime();
                let nearestDate = uniqueDates[0];
                let minDiff = Infinity;
                uniqueDates.forEach(dStr => {
                    const match = dStr.match(/(\d+)月(\d+)日/);
                    const d = new Date(2026, parseInt(match[1]) - 1, parseInt(match[2]));
                    const diff = d.getTime() - nowTime;
                    if (diff >= 0 && diff < minDiff) {
                        minDiff = diff;
                        nearestDate = dStr;
                    }
                });
                activeTodayDate = nearestDate || uniqueDates[0];
            }

            refreshAllUI();
        };

            db.players.forEach(p => {
                p.currentStreak = 0; p.maxWinStreak = 0; p.maxLossStreak = 0; p.netWins = 0;
                let currentW = 0, currentL = 0;
                
                db.matches.filter(m => m.status === 'finished').sort((a,b)=>a.id-b.id).forEach(m => {
                    const b = db.bets[m.id];
                    if (b && b.predictions && b.predictions[p.id] && b.predictions[p.id] !== 'none') {
                        if (b.predictions[p.id] === m.result) {
                            currentW++; currentL = 0; p.netWins++;
                            p.maxWinStreak = Math.max(p.maxWinStreak, currentW);
                            p.currentStreak = currentW;
                        } else {
                            currentL++; currentW = 0; p.netWins--;
                            p.maxLossStreak = Math.max(p.maxLossStreak, currentL);
                            p.currentStreak = -currentL;
                        }
                    }
                });
            });
        }

        function formatRawDbText() {
            const ta = document.getElementById('raw-db-textarea');
            if (!ta) return;
            try {
                const parsed = JSON.parse(ta.value);
                ta.value = JSON.stringify(parsed, null, 4);
            } catch(e) {
                alert("JSON 语法检测到错误，无法格式化！\n错误提示: " + e.message);
            }
        }

        function saveRawDbText() {
            const ta = document.getElementById('raw-db-textarea');
            if (!ta) return;
            try {
                const parsed = JSON.parse(ta.value);
                if (!parsed.players || !parsed.matches) {
                    return alert("保存失败：JSON 必须具有 players 与 matches 核心字段节点！");
                }
                // 实时覆盖并向全网广播，促使旧设备自动接收并静默刷新 [1]
                db = parsed;
                broadcastData();
                refreshAllUI();
                alert("✅ 数据库成功保存！修改信息已实时发布，旧设备正在同步更新！");
            } catch(e) {
                alert("保存失败：您输入的 JSON 存在语法错误，请检查后再行保存！\n" + e.message);
            }
        }

        function exportDatabase() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `wc2026_db_backup_${Date.now()}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importDatabase(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (!parsed.players || !parsed.matches) {
                        return alert("导入失败：导入格式非合法的世界杯数据库备份！");
                    }
                    if (confirm("确定要导入此备份吗？导入后将全面覆盖本地现存的所有数据！")) {
                        db = parsed;
                        broadcastData();
                        refreshAllUI();
                        loadRawDbToTextarea();
                        alert("✅ 数据库备份导入成功，已实时广播同步全网！");
                    }
                } catch(err) {
                    alert("导入失败：该文件并不是合法的 JSON 格式文本。");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        function copyDbToClipboard() {
            const txt = JSON.stringify(db, null, 4);
            navigator.clipboard.writeText(txt).then(() => {
                alert("📋 数据 JSON 已成功复制到您的剪贴板，可前往其他设备进行粘贴！");
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = txt; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                alert("📋 数据 JSON 已成功复制到您的剪贴板！");
            });
        }

        function pasteDbFromClipboard() {
            const input = prompt("请在此处粘贴导出的 JSON 字符串：");
            if (!input) return;
            try {
                const parsed = JSON.parse(input.trim());
                if (!parsed.players || !parsed.matches) {
                    return alert("导入失败：该 JSON 数据不满足玩家及对阵的基础结构特征！");
                }
                db = parsed;
                broadcastData();
                refreshAllUI();
                loadRawDbToTextarea();
                alert("✅ 剪贴板导入成功！数据已实时向所有在线设备进行广播！");
            } catch(e) {
                alert("导入失败：错误的 JSON 语法表达格式！\n" + e.message);
            }
        }

        function resetEntireDatabase() {
            if (confirm("🚨 警告：这会清空本房所有玩家记录、所有历史注单，重置全部104场比赛！确定执行此项毁灭性重置吗？")) {
                db = { players: [], matches: generateMatches(), bets: {}, timestamp: Date.now() };
                broadcastData();
                refreshAllUI();
                loadRawDbToTextarea();
                alert("✅ 数据库已被初始化归零！");
            }
        }

        // --- 交互业务 (下注 & 结算) ---
        function openEditMatch(id) {
            const m = db.matches.find(x => x.id === id); document.getElementById('editMatchId').value = id;
            document.getElementById('editHome').value = m.home; document.getElementById('editAway').value = m.away;
            openModal('editMatchModal');
        }

        function saveMatchEdit() {
            const m = db.matches.find(x => x.id === parseInt(document.getElementById('editMatchId').value));
            m.home = document.getElementById('editHome').value.trim() || '主队'; m.away = document.getElementById('editAway').value.trim() || '客队';
            broadcastData(); closeModal('editMatchModal'); refreshAllUI();
        }

        let actMatchId = null;
        function openBetModal(id) {
            if (!db.players.length) return alert("请先前往「阵营」添加玩家");
            const m = db.matches.find(x => x.id === id); actMatchId = id;
            document.getElementById('bet-match-title').innerText = `${m.home} vs ${m.away}`;
            let b = db.bets[id] || { stake: 100, predictions: {} }; document.getElementById('matchStake').value = b.stake;
            const list = document.getElementById('bet-players-list');
            
            let html = '';
            db.players.forEach(p => {
                let cur = b.predictions[p.id] || 'none';
                html += `
                    <div class="bg-black/20 p-2 rounded-xl flex items-center justify-between border border-white/5">
                        <div class="flex items-center gap-2 w-1/3 truncate"><img src="${p.avatar}" class="w-8 h-8 rounded-full bg-black"><span class="font-bold text-sm text-white">${p.name}</span></div>
                        <div class="flex gap-1 bg-black/50 p-1 rounded-lg">
                            <label><input type="radio" name="p_${p.id}" value="home" class="peer hidden" ${cur==='home'?'checked':''} onchange="playAudio('click')"><div class="px-3 py-1.5 rounded-md text-xs font-bold text-white/40 peer-checked:bg-blue-600 peer-checked:text-white transition cursor-pointer">主</div></label>
                            <label><input type="radio" name="p_${p.id}" value="draw" class="peer hidden" ${cur==='draw'?'checked':''} onchange="playAudio('click')"><div class="px-3 py-1.5 rounded-md text-xs font-bold text-white/40 peer-checked:bg-gray-500 peer-checked:text-white transition cursor-pointer">平</div></label>
                            <label><input type="radio" name="p_${p.id}" value="away" class="peer hidden" ${cur==='away'?'checked':''} onchange="playAudio('click')"><div class="px-3 py-1.5 rounded-md text-xs font-bold text-white/40 peer-checked:bg-red-500 peer-checked:text-white transition cursor-pointer">客</div></label>
                            <label><input type="radio" name="p_${p.id}" value="none" class="peer hidden" ${cur==='none'?'checked':''} onchange="playAudio('click')"><div class="px-3 py-1.5 rounded-md text-xs font-bold text-white/20 peer-checked:text-yellow-500 transition cursor-pointer"><i class="fa-solid fa-ban"></i></div></label>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
            openModal('betModal');
        }

        function saveBets() {
            let stake = parseInt(document.getElementById('matchStake').value) || 0; let preds = {};
            db.players.forEach(p => { for(let r of document.getElementsByName(`p_${p.id}`)) if(r.checked) { preds[p.id] = r.value; break; } });
            db.bets[actMatchId] = { stake, predictions: preds }; broadcastData(); closeModal('betModal'); refreshAllUI();
        }

        function openSettleModal(id) {
            const m = db.matches.find(x => x.id === id); if (!db.bets[id]) return alert("该场比赛无人下注，无法开奖！");
            document.getElementById('settleMatchId').value = id;
            document.getElementById('settle-match-title').innerText = `${m.home} vs ${m.away}`;
            document.getElementById('settleScoreHome').value = ''; document.getElementById('settleScoreAway').value = '';
            document.querySelectorAll('.result-btn').forEach(b => { b.classList.remove('border-yellow-400', 'bg-yellow-400/20', 'text-yellow-400'); b.classList.add('border-white/10', 'bg-black/30'); });
            document.getElementById('settleFinalResult').value = '';
            openModal('settleModal');
        }

        function setResult(res) {
            document.getElementById('settleFinalResult').value = res;
            document.querySelectorAll('.result-btn').forEach(b => { b.classList.remove('border-yellow-400', 'bg-yellow-400/20', 'text-yellow-400'); b.classList.add('border-white/10', 'bg-black/30'); });
            const activeBtn = document.getElementById(`res-${res}`);
            activeBtn.classList.remove('border-white/10', 'bg-black/30', 'text-gray-400');
            activeBtn.classList.add('border-yellow-400', 'bg-yellow-400/20', 'text-yellow-400');
        }

        function confirmSettle() {
            const id = document.getElementById('settleMatchId').value, res = document.getElementById('settleFinalResult').value;
            const scoreH = document.getElementById('settleScoreHome').value, scoreA = document.getElementById('settleScoreAway').value;
            if(!res) return alert("必须选择比赛结果(胜平负)！");

            const m = db.matches.find(x => x.id == id); const b = db.bets[id];
            let parts = [], wins = [];
            let finalScoreText = (scoreH !== '' && scoreA !== '') ? `${scoreH} : ${scoreA}` : null;

            db.players.forEach(p => {
                if(p.totalInvest===undefined) p.totalInvest = 0; if(!p.teamStats) p.teamStats = {};
                if(p.highestBalance===undefined) p.highestBalance = p.balance; if(p.lowestBalance===undefined) p.lowestBalance = p.balance;
                if(p.biggestWin===undefined) p.biggestWin = 0; if(p.biggestLoss===undefined) p.biggestLoss = 0;
            });

            for (let pid in b.predictions) {
                if (b.predictions[pid] !== 'none') {
                    parts.push(pid);
                    if (b.predictions[pid] === res) wins.push(pid);
                }
            }

            if(parts.length > 0) {
                let pool = parts.length * b.stake;
                parts.forEach(pid => {
                    let p = db.players.find(x => x.id === pid);
                    if(p) {
                        p.totalBets++; p.totalInvest += b.stake; p.balance -= b.stake;
                        let predTeam = b.predictions[pid] === 'home' ? m.home : (b.predictions[pid] === 'away' ? m.away : '平局');
                        if (wins.includes(pid)) {
                            p.correctGuesses++; let winAmt = pool / wins.length; p.balance += winAmt;
                            let netProfit = winAmt - b.stake; p.biggestWin = Math.max(p.biggestWin, netProfit);
                            p.teamStats[predTeam] = (p.teamStats[predTeam] || 0) + netProfit;
                        } else {
                            p.biggestLoss = Math.max(p.biggestLoss, b.stake); p.teamStats[predTeam] = (p.teamStats[predTeam] || 0) - b.stake;
                        }
                        p.highestBalance = Math.max(p.highestBalance, p.balance); p.lowestBalance = Math.min(p.lowestBalance, p.balance);
                    }
                });
                if (wins.length > 0) {
                    playAudio('win');
                    if(typeof confetti !== 'undefined') confetti({particleCount: 200, spread: 100, origin:{y:0.6}, zIndex: 9999, colors: ['#FFD700', '#FF8C00', '#00F3FF']});
                    setTimeout(() => alert(`🎊 结算完成!\n赢家: ${wins.map(pid=>db.players.find(x=>x.id===pid).name).join(', ')}\n各分得: $${(pool/wins.length).toFixed(1)}`), 500);
                } else {
                    alert(`💸 爆冷！全军覆没，庄家吃掉 $${pool}`);
                }
            }
            m.status = 'finished'; m.result = res; m.score = finalScoreText; m.winners = wins;
            broadcastData(); closeModal('settleModal'); refreshAllUI();
        }
    </script>
</body>
</html>
